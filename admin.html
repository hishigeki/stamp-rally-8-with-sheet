<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>景品交換管理</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; background: #f7f7f7; padding: 16px; }
    h1 { text-align: center; }
    #reader { width: 100%; max-width: 420px; margin: auto; }
    .card { background: white; border-radius: 12px; padding: 16px; margin-top: 16px; text-align: center; border: 2px solid #ddd; }
    .ok { border-color: #2ecc71; background: #f0fff5; }
    .ng { border-color: #e74c3c; background: #fff0f0; }
    .warn { border-color: #f1c40f; background: #fffbea; }
    button { font-size: 18px; padding: 14px 18px; border-radius: 10px; border: none; color: white; font-weight: bold; margin: 8px 0; width: 100%; }
    .normalBtn { background: #2ecc71; }
    .fastBtn { background: #f39c12; }
    .scanBtn { background: #3498db; }
  </style>
</head>
<body>

<h1>景品交換管理</h1>

<div id="reader"></div>

<div id="result" class="card">
  参加者のコンプリート画面のQRコードを読み取ってください。
</div>

<script>
const GAS_URL =
"https://script.google.com/macros/s/AKfycbzfduTsOl5TIlOUYcYxkKdWewy_4gAYL2tsRzO4XYi9xNWabrofhcsQz_HKOs1XlPtD7Q/exec";

const API_TOKEN = "api_1438d5a18d8959b0b8479f6e0a5cb2f9";

let currentParticipantId = "";
let html5QrCode;

function showResult(html, type) {
  const result = document.getElementById("result");
  result.className = "card " + type;
  result.innerHTML = html;
}

function callGas(params, callbackName) {
  const url = new URL(GAS_URL);

  for (const key in params) {
    url.searchParams.set(key, params[key]);
  }

  url.searchParams.set("token", API_TOKEN);
  url.searchParams.set("callback", callbackName);

  const script = document.createElement("script");

  script.onerror = () => {
    showResult("GASへ接続できません。URLまたはデプロイ設定を確認してください。", "ng");
    resumeScanLater();
  };

  script.src = url.toString();
  document.body.appendChild(script);
}

function resumeScanLater() {
  setTimeout(() => {
    try {
      html5QrCode.resume();
    } catch (e) {}
  }, 2000);
}

function checkPrize(participantId) {
  currentParticipantId = participantId;

  showResult(`
    <h2>QRを読み取りました</h2>
    <p>${participantId}</p>
    <p>Spreadsheetを確認中です...</p>
  `, "warn");

  window.handleCheckPrize = function(res) {
    if (!res || !res.result) {
      showResult("確認に失敗しました。", "ng");
      resumeScanLater();
      return;
    }

    if (res.result === "OK") {
      showResult(`
        <h2>交換OK</h2>
        <p>${participantId}</p>
        <p>景品を渡す前に、どちらかを押してください。</p>

        <button class="normalBtn" onclick="claimPrizeNormal()">
          通常時：詳しく記録して交換済みにする
        </button>

        <button class="fastBtn" onclick="claimPrizeFast()">
          混雑時：すぐ交換済みにする
        </button>
      `, "ok");

    } else if (res.result === "DUPLICATE") {
      showResult(`
        <h2>交換済み</h2>
        <p>${participantId}</p>
        <p>この参加者には、すでに景品を渡しています。</p>
        <button class="scanBtn" onclick="resumeNow()">次を読み取る</button>
      `, "ng");

    } else if (res.result === "NOT_COMPLETE") {
      showResult(`
        <h2>未コンプリート</h2>
        <p>${participantId}</p>
        <p>まだ景品交換できません。</p>
        <button class="scanBtn" onclick="resumeNow()">次を読み取る</button>
      `, "warn");

    } else {
      showResult(`
        <h2>不明なID</h2>
        <p>${participantId}</p>
        <p>Spreadsheetに記録がありません。</p>
        <button class="scanBtn" onclick="resumeNow()">次を読み取る</button>
      `, "ng");
    }
  };

  callGas({
    action: "checkPrize",
    participantId: participantId
  }, "handleCheckPrize");
}

function claimPrizeNormal() {
  claimPrize("normal");
}

function claimPrizeFast() {
  claimPrize("fast");
}

function claimPrize(mode) {
  window.handleClaimPrize = function(res) {
    if (res && res.result === "OK") {
      showResult(`
        <h2>交換完了</h2>
        <p>${currentParticipantId}</p>
        <p>${mode === "fast" ? "混雑時モードで最小記録しました。" : "通常モードで詳しく記録しました。"}</p>
        <button class="scanBtn" onclick="resumeNow()">次を読み取る</button>
      `, "ok");

    } else if (res && res.result === "DUPLICATE") {
      showResult(`
        <h2>交換済み</h2>
        <p>${currentParticipantId}</p>
        <p>すでに交換済みです。</p>
        <button class="scanBtn" onclick="resumeNow()">次を読み取る</button>
      `, "ng");

    } else {
      showResult(`
        <h2>交換できません</h2>
        <p>${res ? res.result : "ERROR"}</p>
        <button class="scanBtn" onclick="resumeNow()">次を読み取る</button>
      `, "warn");
    }
  };

  callGas({
    action: "claimPrize",
    participantId: currentParticipantId,
    mode: mode
  }, "handleClaimPrize");
}

function resumeNow() {
  showResult("参加者のコンプリート画面のQRコードを読み取ってください。", "");
  try {
    html5QrCode.resume();
  } catch (e) {}
}

function onScanSuccess(decodedText) {
  try {
    html5QrCode.pause(true);
  } catch (e) {}

  const participantId = decodedText.trim();

  if (!participantId.startsWith("DX-")) {
    showResult(`
      <h2>読み取りエラー</h2>
      <p>このQRコードは参加者IDではありません。</p>
      <p>${participantId}</p>
      <button class="scanBtn" onclick="resumeNow()">次を読み取る</button>
    `, "ng");
    return;
  }

  checkPrize(participantId);
}

html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  onScanSuccess
);
</script>

</body>
</html>
